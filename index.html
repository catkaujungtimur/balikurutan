<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balik Urutan KA - catkaujungtimur</title>
    <style>
        :root { --primary: #002d5e; --secondary: #f39c12; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .header { text-align: center; color: var(--primary); margin-bottom: 20px; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 550px; }
        h3 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; font-size: 12px; }
        th { background: #f8f9fa; text-align: center; }
        input { width: 100%; border: none; outline: none; background: transparent; font-family: inherit; font-size: 12px; }
        .tonase-row { background: #fff3cd; font-weight: bold; }
        .btn { padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .btn-reverse { background: var(--secondary); color: white; width: 100%; margin-top: 10px; font-size: 16px; height: 50px; }
        .info { font-size: 11px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2>Program Balik Urutan Rangkaian</h2>
</div>

<div class="main-container">
    <div class="panel">
        <h3>DATA ASLI <button class="btn" style="background:#6c757d; color:white" onclick="location.reload()">Reset</button></h3>
        <div class="info">*Klik kolom pertama lalu Paste (Ctrl+V) dari Spreadsheet</div>
        <table>
            <thead>
                <tr>
                    <th>No Sarana</th>
                    <th width="40">ST</th>
                    <th width="60">Berat</th>
                    <th width="120">Catatan/Order</th>
                </tr>
            </thead>
            <tbody id="inputBody">
                </tbody>
        </table>
    </div>

    <div class="panel">
        <h3>HASIL BALIK <button class="btn" style="background:var(--success); color:white" onclick="copyResult()">Copy Hasil</button></h3>
        <div class="info">*Silakan edit manual di sini sebelum di-copy</div>
        <table>
            <thead>
                <tr>
                    <th>No Sarana</th>
                    <th width="40">ST</th>
                    <th width="60">Berat</th>
                    <th width="120">Catatan/Order</th>
                </tr>
            </thead>
            <tbody id="outputBody">
                </tbody>
        </table>
    </div>
</div>

<div style="text-align: center; margin-top: 20px;">
    <button class="btn btn-reverse" style="max-width: 1120px;" onclick="processReverse()">🔄 BALIK URUTAN SEKARANG</button>
</div>

<script>
    function createRows(targetId, count) {
        const body = document.getElementById(targetId);
        body.innerHTML = "";
        for (let i = 0; i < count; i++) {
            const row = body.insertRow();
            row.innerHTML = `
                <td><input type="text" class="id"></td>
                <td><input type="text" class="st"></td>
                <td><input type="text" class="br"></td>
                <td><input type="text" class="ct"></td>
            `;
        }
    }

    // Fungsi menangkap Paste dari Excel (4 Kolom)
    document.addEventListener('paste', function(e) {
        if (e.target.tagName === 'INPUT') return;
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        const rows = pasteData.split('\n');
        const tbody = document.getElementById('inputBody');
        
        if (rows.length > 0) {
            e.preventDefault();
            tbody.innerHTML = "";
            rows.forEach(line => {
                if (line.trim() === "") return;
                const cols = line.split('\t');
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><input type="text" class="id" value="${cols[0] || ''}"></td>
                    <td><input type="text" class="st" value="${cols[1] || ''}"></td>
                    <td><input type="text" class="br" value="${cols[2] || ''}"></td>
                    <td><input type="text" class="ct" value="${cols[3] || ''}"></td>
                `;
            });
        }
    });

    function processReverse() {
        const inputRows = Array.from(document.querySelectorAll("#inputBody tr"));
        let data = inputRows.map(row => ({
            id: row.querySelector(".id").value,
            st: row.querySelector(".st").value,
            br: row.querySelector(".br").value,
            ct: row.querySelector(".ct").value
        })).filter(item => item.id.trim() !== "");

        if (data.length === 0) return;

        // Pisahkan Tonase agar tetap di bawah
        const tonaseIndex = data.findIndex(item => item.id.toUpperCase().includes("TONASE"));
        let tonaseRow = null;
        if (tonaseIndex !== -1) {
            tonaseRow = data.splice(tonaseIndex, 1)[0];
        }

        // Balik Urutan
        data.reverse();

        // Gabungkan kembali
        if (tonaseRow) data.push(tonaseRow);

        // Render ke Tabel Kanan (Sebagai input agar bisa diedit manual)
        const outputBody = document.getElementById("outputBody");
        outputBody.innerHTML = "";
        data.forEach(item => {
            const row = outputBody.insertRow();
            if (item.id.toUpperCase().includes("TONASE")) row.className = "tonase-row";
            row.innerHTML = `
                <td><input type="text" class="id" value="${item.id}"></td>
                <td><input type="text" class="st" value="${item.st}"></td>
                <td><input type="text" class="br" value="${item.br}"></td>
                <td><input type="text" class="ct" value="${item.ct}"></td>
            `;
        });
    }

    function copyResult() {
        const rows = Array.from(document.querySelectorAll("#outputBody tr"));
        const text = rows.map(row => {
            return [
                row.querySelector(".id").value,
                row.querySelector(".st").value,
                row.querySelector(".br").value,
                row.querySelector(".ct").value
            ].join('\t');
        }).join('\n');
        
        navigator.clipboard.writeText(text).then(() => alert("Hasil dicopy ke clipboard!"));
    }

    createRows("inputBody", 15);
</script>

</body>
</html>
